<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Mock Jihan Server — Control Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { color: #00d4ff; margin-bottom: 20px; }
  h2 { color: #aaa; font-size: 14px; margin: 16px 0 8px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; }
  select, input { background: #0f3460; border: 1px solid #00d4ff; color: #e0e0e0;
    padding: 6px 10px; border-radius: 4px; font-family: monospace; width: 100%; margin-bottom: 8px; }
  #confirm-banner { display:none; background:#1a3a1a; border:2px solid #00ff88;
    border-radius:8px; padding:12px 16px; margin-bottom:16px;
    color:#00ff88; font-size:13px; animation: flashIn 0.3s ease; }
  @keyframes flashIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  button { background: #00d4ff; color: #1a1a2e; border: none; padding: 8px 16px;
    border-radius: 4px; cursor: pointer; font-weight: bold; font-family: monospace; }
  button:hover { background: #00b4d8; }
  button.danger { background: #e63946; color: white; }
  button.warn  { background: #f4a261; color: #1a1a2e; }
  .log-box { background: #0f0f1a; border: 1px solid #333; border-radius: 4px;
    padding: 10px; height: 280px; overflow-y: auto; font-size: 12px; line-height: 1.6; }
  .log-box .recv { color: #90ee90; }
  .log-box .send { color: #87ceeb; }
  .log-box .api  { color: #ffd700; }
  .tag { display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 11px; margin-right: 4px; }
  .tag.recv { background: #1a4a1a; color: #90ee90; }
  .tag.send { background: #1a2a4a; color: #87ceeb; }
  .tag.api  { background: #4a3a00; color: #ffd700; }
  #terminals-list { font-size: 13px; }
  .terminal-row { display: flex; align-items: center; gap: 8px; margin: 4px 0;
    background: #0f3460; padding: 6px 10px; border-radius: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; }
  .dot.off { background: #555; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .group-label { font-size: 11px; color: #5599cc; text-transform: uppercase;
    letter-spacing: 1px; margin-top: 14px; margin-bottom: 2px;
    border-bottom: 1px solid #1a3a5a; padding-bottom: 3px; }
  /* Fault Injection */
  .fi-btn { background: #111827; color: #667; border: 1px solid #2a3a4a;
    padding: 4px 11px; border-radius: 4px; cursor: pointer;
    font-family: monospace; font-size: 12px; transition: border-color 0.1s, color 0.1s; }
  .fi-btn:hover { border-color: #00d4ff; color: #ccc; }
  .fi-active-ok   { background: #071a10 !important; border-color: #00ff88 !important; color: #00ff88 !important; }
  .fi-active-err  { background: #1f0a0a !important; border-color: #e63946 !important; color: #e63946 !important; }
  .fi-active-warn { background: #1f1005 !important; border-color: #f4a261 !important; color: #f4a261 !important; }
  .fi-label { font-size: 12px; color: #aaa; font-family: monospace; padding-top: 2px; }
</style>
</head>
<body>
<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:20px">
  <h1 style="margin:0">🛰 Mock Jihan Server — Control Panel</h1>
  <span id="version-tag" style="font-size:12px;color:#555;font-family:monospace">loading...</span>
</div>
<div id="confirm-banner"></div>

<div class="grid">
  <!-- Left: Push Commands -->
  <div class="card">
    <h2>選擇裝置</h2>
    <select id="imei-select" onchange="refreshApiLog();refreshWsLog()"><option value="">— select terminal —</option></select>

    <!-- 系統控制 -->
    <div class="group-label">系統控制</div>
    <div class="btn-row">
      <button onclick="push('status_request')">status_request</button>
      <button onclick="push('reboot_request')" class="danger">reboot</button>
      <button onclick="push('clear_request')" class="warn">clear_request</button>
    </div>

    <!-- Log -->
    <div class="group-label">Log</div>
    <div class="btn-row">
      <button onclick="push('log_start_request')">log_start</button>
      <button onclick="push('log_stop_request')">log_stop</button>
    </div>

    <!-- 韌體 / 硬體測試 -->
    <div class="group-label">韌體 / 硬體</div>
    <div class="btn-row">
      <button onclick="push('firmware_update')" class="warn">firmware_update</button>
      <button onclick="pushBuzzer()">buzzer</button>
    </div>

    <!-- 交易 -->
    <div class="group-label">交易</div>
    <div class="btn-row">
      <button onclick="pushPaymentConfirm()">payment_confirm</button>
      <button onclick="setConfirmReject('reject')" class="danger">confirm_reject (402)</button>
      <button onclick="setConfirmReject('conflict')" class="warn">confirm_conflict (409)</button>
    </div>
    <div id="pending-confirm-info" style="margin-top:6px;font-size:12px;color:#aaa;min-height:18px"></div>

    <!-- Connected Terminals -->
    <div class="group-label" style="margin-top:12px">Connected Terminals
      <button onclick="refreshTerminals()" style="font-size:11px;padding:2px 8px;margin-left:6px">↻</button>
    </div>
    <div id="terminals-list">Loading...</div>
  </div>

  <!-- Right: HTTPS API Log -->
  <div class="card">
    <h2>HTTPS API Log (latest 50)</h2>
    <div class="log-box" id="api-log-box"></div>
  </div>
</div>

<!-- Fault Injection (full width) -->
<div class="card" style="margin-top:16px">
  <h2>API Fault Injection
    <span style="font-size:11px;color:#555;font-weight:normal;margin-left:8px">設定後立即生效，裝置下次請求時套用</span>
  </h2>
  <div id="fault-table" style="display:grid;grid-template-columns:auto 1fr;column-gap:16px;row-gap:12px;align-items:start;margin-top:10px"></div>
</div>

<!-- Live Log (full width, taller) -->
<div class="card" style="margin-top:16px">
  <h2>Live Log — WS Messages
    <button onclick="clearLog()" style="font-size:11px;padding:2px 8px;margin-left:6px">Clear</button>
    <button onclick="refreshAll()" style="font-size:11px;padding:2px 8px;margin-left:4px">↻ Refresh</button>
  </h2>
  <div class="log-box" id="log-box" style="height:400px"></div>
</div>

<script>
const $ = id => document.getElementById(id);

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  return r.json();
}

// ── Terminals ─────────────────────────────────────────────────────────────────
async function refreshTerminals() {
  const [live, all, products] = await Promise.all([
    fetchJSON('/ctrl/terminals'),
    fetchJSON('/ctrl/terminals/all'),
    fetchJSON('/ctrl/latest-products'),
  ]);
  const sel = $('imei-select');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— select terminal —</option>';
  // 所有曾出現過的裝置都列入選單（WS 未連線的標記 offline）
  all.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.imei;
    opt.textContent = live.includes(t.imei) ? t.imei : `${t.imei} (offline)`;
    if (!live.includes(t.imei)) opt.style.color = '#888';
    sel.appendChild(opt);
  });
  if (prev) sel.value = prev;

  // Show pending payment_confirm info for selected terminal
  const selectedImei = $('imei-select').value || prev;
  const pending = products[selectedImei];
  $('pending-confirm-info').textContent = pending
    ? `⏳ 待確認: payment_id=${pending.payment_id}  col=${pending.column}  price=${pending.price}`
    : '';

  const list = $('terminals-list');
  if (all.length === 0) { list.textContent = 'No terminals registered yet.'; return; }
  list.innerHTML = all.map(t => `
    <div class="terminal-row">
      <div class="dot ${live.includes(t.imei) ? '' : 'off'}"></div>
      <span>${t.imei}</span>
      <span style="color:#888;font-size:11px">last seen: ${t.last_seen || '-'}</span>
    </div>`).join('');
}

// ── WS Push ───────────────────────────────────────────────────────────────────
function getSelectedImei() {
  const v = $('imei-select').value;
  if (!v) { alert('Please select a terminal first.'); return null; }
  return v;
}

async function push(type, extra = {}) {
  const imei = getSelectedImei();
  if (!imei) return;
  const res = await fetchJSON('/ctrl/push', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imei, type, ...extra }),
  });
  appendLog('send', type, { imei, type, ...extra });
  console.log('push result:', res);
}

function pushBuzzer() {
  const id = prompt('Buzzer pattern ID (1=short, 2=long, 3=double, 4=triple):', '1');
  if (!id) return;
  push('buzzer_request', { buzzer: parseInt(id) });
}

async function setConfirmReject(mode) {
  const imei = getSelectedImei();
  if (!imei) return;
  await fetchJSON('/ctrl/confirm-reject', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imei, mode }),
  });
  const label = mode === 'conflict' ? '409 conflict（裝置會重試）' : '402 declined（裝置走取消）';
  appendLog('send', `next confirm → ${label}`, { imei });
  alert(`設定完成：${imei} 下一筆 confirm 將回 ${label}`);
}

async function pushPaymentConfirm() {
  const imei = getSelectedImei();
  if (!imei) return;

  // Try to get payment_id from latest product API call
  const products = await fetchJSON('/ctrl/latest-products');
  const latest = products[imei];

  let payment_id;
  if (latest) {
    payment_id = latest.payment_id;
    $('pending-confirm-info').textContent = '';
  } else {
    payment_id = prompt('找不到待確認交易，請手動輸入 payment_id:');
    if (!payment_id) return;
  }

  push('payment_confirm_request', { payment_id });
}

// ── Logs ──────────────────────────────────────────────────────────────────────
function appendLog(direction, type, payload) {
  const box = $('log-box');
  const ts = new Date().toLocaleTimeString();
  const line = document.createElement('div');
  line.innerHTML = `<span style="color:#555">${ts}</span> <span class="tag ${direction}">${direction.toUpperCase()}</span> <b>${type}</b> ${JSON.stringify(payload)}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function clearLog() { $('log-box').innerHTML = ''; }

async function refreshApiLog() {
  const imei = $('imei-select').value;
  const url = imei ? `/ctrl/logs?limit=50&imei=${encodeURIComponent(imei)}` : '/ctrl/logs?limit=50';
  const logs = await fetchJSON(url);
  const box = $('api-log-box');
  box.innerHTML = logs.length === 0
    ? `<div style="color:#555">（無紀錄${imei ? ' — ' + imei : ''}）</div>`
    : logs.map(l => {
        const res = JSON.parse(l.response_body || '{}');
        return `<div class="api"><span style="color:#555">${l.created_at}</span> `+
          `<span class="tag api">API</span> <b>${l.api_name}</b> `+
          `<span style="color:#888">${l.imei}</span> `+
          `→ <span style="color:#ffd700">${JSON.stringify(res)}</span></div>`;
      }).join('');
}

async function refreshWsLog() {
  const imei = $('imei-select').value;
  const url = imei ? `/ctrl/ws-messages?limit=100&imei=${encodeURIComponent(imei)}` : '/ctrl/ws-messages?limit=100';
  const msgs = await fetchJSON(url);
  const box = $('log-box');
  box.innerHTML = msgs.length === 0
    ? `<div style="color:#555">（無 WS 訊息${imei ? ' — ' + imei : ''}）</div>`
    : msgs.reverse().map(m =>
        `<div><span style="color:#555">${m.created_at}</span> `+
        `<span class="tag ${m.direction}">${m.direction.toUpperCase()}</span> `+
        `<b>${m.type}</b> <span style="color:#888">${m.imei}</span> `+
        `<span style="color:#aaa">${m.payload}</span></div>`
      ).join('');
}

async function refreshAll() {
  await Promise.all([refreshTerminals(), refreshApiLog(), refreshWsLog(), refreshFaults()]);
}

// ── SSE: real-time notifications from server ──────────────────────────────────
function closeBanner() { document.getElementById('confirm-banner').style.display = 'none'; }

function initSSE() {
  const es = new EventSource('/ctrl/events');

  es.onmessage = (e) => {
    const ev = JSON.parse(e.data);

    if (ev.type === 'product') {
      // Delay banner by 1.5s: firmware (LTE) needs time to receive the HTTP
      // response and transition to PRODUCT_API_SUCCESS before we push WS confirm.
      setTimeout(() => showConfirmBanner(ev.imei, ev.payment_id, ev.column, ev.price), 1500);
      refreshTerminals();
      refreshApiLog();
    }
  };

  es.onerror = () => {
    // SSE disconnected, retry automatically (browser handles reconnect)
  };
}

function showConfirmBanner(imei, paymentId, column, price) {
  const banner = document.getElementById('confirm-banner');
  const btn = (label, color, onclick) =>
    `<button onclick="${onclick}"
      style="background:${color};color:#1a1a2e;border:none;padding:5px 14px;
             border-radius:4px;cursor:pointer;font-weight:bold;margin-left:6px">
      ${label}
    </button>`;

  banner.innerHTML = `
    <b>🔔 商品選擇收到！</b> &nbsp;
    IMEI: <b>${imei}</b> &nbsp;|&nbsp;
    col: <b>${column}</b> &nbsp;|&nbsp;
    price: <b>${price}</b> &nbsp;|&nbsp;
    payment_id: <b>${paymentId}</b>
    <div style="margin-top:8px">
      ${btn('✅ 刷卡成功 (confirm)', '#00d4ff', `quickAction('${imei}','${paymentId}','confirm')`)}
      ${btn('❌ 拒卡 (402)', '#e63946',        `quickAction('${imei}','${paymentId}','reject')`)}
      ${btn('⚠️ 衝突重試 (409)', '#f4a261',    `quickAction('${imei}','${paymentId}','conflict')`)}
      <button onclick="closeBanner()"
        style="background:transparent;color:#aaa;border:none;cursor:pointer;margin-left:12px">✕ 忽略</button>
    </div>
  `;
  banner.style.display = 'block';
  clearTimeout(banner._timer);
  banner._timer = setTimeout(() => { banner.style.display = 'none'; }, 30000);
}

async function quickAction(imei, paymentId, action) {
  if (action !== 'confirm') {
    await fetchJSON('/ctrl/confirm-reject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imei, mode: action }),
    });
    appendLog('send', `confirm → ${action}`, { imei, payment_id: paymentId });
  }

  // Push payment_confirm_request via WS
  const res = await fetchJSON('/ctrl/push', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imei, type: 'payment_confirm_request', payment_id: paymentId }),
  });

  if (!res.ok) {
    // Push failed: terminal not connected via WS
    const live = await fetchJSON('/ctrl/terminals');
    const banner = $('confirm-banner');
    banner.innerHTML = `
      <b style="color:#e63946">❌ 推送失敗！</b> &nbsp;
      IMEI <b>${imei}</b> 不在 WS 連線清單中。<br>
      <span style="font-size:12px;color:#aaa">
        目前連線的 IMEI: <b>${live.length ? live.join(', ') : '（無）'}</b>
      </span><br>
      <div style="margin-top:6px">
        ${live.map(id => `<button onclick="quickAction('${id}','${paymentId}','${action}')"
          style="background:#00d4ff;color:#1a1a2e;border:none;padding:4px 10px;
                 border-radius:4px;cursor:pointer;margin-right:6px">
          改用 ${id} 重送
        </button>`).join('')}
        <button onclick="closeBanner()"
          style="background:transparent;color:#aaa;border:none;cursor:pointer">✕</button>
      </div>`;
    banner.style.display = 'block';
    appendLog('send', '❌ push FAILED', { imei, live });
    return;
  }

  $('confirm-banner').style.display = 'none';
  appendLog('send', 'payment_confirm_request', { imei, payment_id: paymentId });
}

// ── Fault Injection ───────────────────────────────────────────────────────────
const FAULT_ROUTES = [
  { key: 'notify',  label: 'notify',  desc: '每筆交易後上傳 POS 資料（失敗時裝置存入 Flash Queue）', modes: ['500', 'timeout', 'bad_json', 'close'] },
  { key: 'batch',   label: 'batch',   desc: '每日批量對帳上傳（collation batch）',                   modes: ['500', 'timeout', 'bad_json', 'close'] },
  { key: 'confirm', label: 'confirm', desc: 'NFC / IC 卡扣款確認（失敗時裝置走取消流程）',           modes: ['500', 'timeout'] },
  { key: 'product', label: 'product', desc: '商品選擇時查詢價格（失敗時裝置回 standby）',            modes: ['500', 'timeout'] },
  { key: 'token',   label: 'token',   desc: '開機時取得授權 token（失敗時無法進入正常模式）',         modes: ['500', 'timeout'] },
];

const MODE_LABEL = { normal: '● 正常', '500': '500', timeout: 'Timeout', bad_json: 'Bad JSON', close: '斷線' };
const MODE_CLASS  = { normal: 'fi-active-ok', '500': 'fi-active-err', timeout: 'fi-active-warn', bad_json: 'fi-active-warn', close: 'fi-active-err' };

function buildFaultTable() {
  const table = $('fault-table');
  table.innerHTML = '';
  for (const r of FAULT_ROUTES) {
    const lbl = document.createElement('div');
    lbl.innerHTML =
      `<div class="fi-label">${r.label}</div>` +
      `<div style="font-size:11px;color:#556;margin-top:2px;white-space:nowrap">${r.desc}</div>`;
    table.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'btn-row';
    for (const mode of ['normal', ...r.modes]) {
      const btn = document.createElement('button');
      btn.className = 'fi-btn';
      btn.dataset.route = r.key;
      btn.dataset.mode  = mode;
      btn.textContent   = MODE_LABEL[mode] || mode;
      btn.onclick = () => setFault(r.key, mode === 'normal' ? null : mode);
      row.appendChild(btn);
    }
    table.appendChild(row);
  }
}

async function refreshFaults() {
  const faults = await fetchJSON('/ctrl/fault');
  for (const [route, mode] of Object.entries(faults)) {
    const active = mode || 'normal';
    document.querySelectorAll(`.fi-btn[data-route="${route}"]`).forEach(btn => {
      btn.classList.remove('fi-active-ok', 'fi-active-err', 'fi-active-warn');
      if (btn.dataset.mode === active) btn.classList.add(MODE_CLASS[active] || 'fi-active-warn');
    });
  }
}

async function setFault(route, mode) {
  await fetchJSON('/ctrl/fault', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ route, mode }),
  });
  refreshFaults();
}

// ── Version ───────────────────────────────────────────────────────────────────
async function loadVersion() {
  const v = await fetchJSON('/ctrl/version');
  const t = new Date(v.deploy_time).toLocaleString();
  $('version-tag').textContent = `v${v.version}  •  ${t}`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadVersion();
buildFaultTable();
refreshAll();
setInterval(refreshAll, 5000);
initSSE();
</script>
</body>
</html>
